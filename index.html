        // FUNGSI UTILITAS

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const formatTime = (seconds) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if(h > 0) return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

                    setResumeConfig({ isOpen: true, data: JSON.parse(savedSession) });
                }
            }, [appState]);

            // Timer Loop
            React.useEffect(() => {
                let timer;
                if (appState === 'exam' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                clearInterval(timer);
                                autoSubmitTimeOut();
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);

            // Auto Save ke LocalStorage
            React.useEffect(() => {
                if (appState === 'exam') {
                    const sessionData = { studentData, examData, currentQuestionIdx, timeLeft, warnings };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionData));
                }
            }, [appState, examData, currentQuestionIdx, timeLeft, warnings, studentData]);

            // Anti Cheat Listeners
            React.useEffect(() => {
                if (appState !== 'exam') return;

                const handleVisibilityChange = () => {
                    if (document.hidden) handleCheatViolation("Berpindah Tab/Aplikasi");
                };

                const handleFullscreenChange = () => {
                    if (!document.fullscreenElement) handleCheatViolation("Keluar dari Mode Fullscreen");
                };

                document.addEventListener('visibilitychange', handleVisibilityChange);
                document.addEventListener('fullscreenchange', handleFullscreenChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                };
            }, [appState, warnings, examData]);

            const handleCheatViolation = (reason) => {
                const currentWarnings = warnings + 1;
                setWarnings(currentWarnings);
                
                if (currentWarnings === 1) {
                    showModal('warning', 'PERINGATAN PELANGGARAN!', `Sistem mendeteksi Anda: ${reason}. Ini adalah peringatan pertama. Jika diulangi, ujian akan otomatis dihentikan dan nilai dikirim apa adanya.`, () => {
                        requestFullscreen();
                        closeModal();
                    });

                        closeModal();

                    if (q.type === 'short_answer') {
                        return { ...q, textAnswer: '' };

                    return {
                        ...q,
                        options: shuffleArray(q.options),
                        selectedOptionId: null

                setExamData(shuffledQuestions);

                setAppState('exam');
                requestFullscreen();

            const isQuestionAnswered = (q) => {
                if (q.type === 'short_answer') return q.textAnswer && q.textAnswer.trim().length > 0;
                return q.selectedOptionId !== null;
            };

                const unAnswered = examData.filter(q => !isQuestionAnswered(q)).length;

                if (unAnswered > 0) {
                    msg = `PERHATIAN: Ada ${unAnswered} soal yang belum dijawab! ` + msg;

                showModal('confirm', 'Konfirmasi Selesai', msg,

                // Hitung Skor (Skala 0 - 100)
                let correctCount = 0;
                examData.forEach(q => {
                    if (q.type === 'short_answer') {
                        const userAns = (q.textAnswer || '').trim().toLowerCase();
                        const isCorrect = q.correctAnswers.some(ans => userAns === ans.toLowerCase());
                        if (isCorrect) correctCount++;
                    } else {
                        const correctOption = q.options.find(opt => opt.isCorrect);
                        if (q.selectedOptionId === correctOption.id) {
                            correctCount++;
                        }
                    }
                });
                
                const calculatedScore = Math.round((correctCount / examData.length) * 100);
                setFinalScore(calculatedScore);

                // Payload
                const payload = {
                    timestamp: new Date().toISOString(),
                    nama: studentData.name,
                    kelas: studentData.class,
                    tanggal: studentData.date,
                    skor: calculatedScore,
                    pelanggaran: warnings,
                    keterangan: notes,
                    debug: JSON.stringify({benar: correctCount, total: examData.length})
                };

                // Fetch ke Google Sheets
                fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    localStorage.removeItem(STORAGE_KEY);
                    setIsSubmitting(false);
                    setAppState('finished');
                    if (document.exitFullscreen) document.exitFullscreen().catch(e => console.log(e));

                    console.error("Gagal mengirim:", err);
                    localStorage.removeItem(STORAGE_KEY);
                    setIsSubmitting(false);
                    setAppState('finished');
                    if (document.exitFullscreen) document.exitFullscreen().catch(e => console.log(e));
                });
            };

                        <main className="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                            
                            {/* Area Soal (Kiri) */}
                            <div className="flex-1 p-4 md:p-8 overflow-y-auto pb-32 md:pb-8">
                                <div className="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                    <div className="flex items-start gap-4 mb-6">
                                        <div className="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold text-lg shrink-0">
                                            {currentQuestionIdx + 1}
                                        </div>
                                        <div className="flex-1">
                                            <p className="text-slate-800 text-lg leading-relaxed whitespace-pre-line">{currentQ.text}</p>
                                            
                                            {/* Render Image jika ada */}
                                            {currentQ.image && (
                                                <div className="mt-4 mb-6 rounded-lg overflow-hidden border border-slate-200 max-w-md">
                                                    <img 
                                                        src={currentQ.image} 
                                                        alt="Ilustrasi Soal" 
                                                        className="w-full h-auto object-cover max-h-72" 
                                                        onError={(e) => {
                                                            e.target.onerror = null; 
                                                            e.target.src = "https://via.placeholder.com/600x400?text=Gambar+Tidak+Ditemukan.+Harap+Periksa+Path/URL.";
                                                        }}
                                                    />
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {currentQ.type === 'short_answer' ? (
                                        <div className="pl-0 md:pl-14">
                                            <input 
                                                type="text" 
                                                value={currentQ.textAnswer || ''} 
                                                onChange={(e) => handleTextAnswerChange(e.target.value)}
                                                placeholder="Ketik jawaban Anda di sini..."
                                                className="w-full px-4 py-3 rounded-xl border-2 border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-lg text-slate-800"
                                                autoComplete="off"
                                            />
                                            <p className="text-sm text-slate-500 mt-2 flex items-center gap-1">
                                                <i data-lucide="info" className="w-4 h-4"></i> Ketikkan jawaban dengan singkat dan jelas (contoh: "nasional", "malaysia", dll).
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3 pl-0 md:pl-14">
                                            {currentQ.options.map((opt, idx) => {
                                                const labels = ['A', 'B', 'C', 'D'];
                                                const isSelected = currentQ.selectedOptionId === opt.id;
                                                return (
                                                    <div 
                                                        key={opt.id}
                                                        onClick={() => handleOptionSelect(opt.id)}
                                                        className={`p-4 rounded-xl border-2 cursor-pointer transition-all flex items-center gap-3 ${isSelected ? 'border-blue-500 bg-blue-50' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'}`}
                                                    >
                                                        <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold ${isSelected ? 'border-blue-500 bg-blue-500 text-white' : 'border-slate-300 text-slate-500'}`}>
                                                            {labels[idx]}
                                                        </div>
                                                        <span className={`text-base ${isSelected ? 'text-blue-900 font-medium' : 'text-slate-700'}`}>{opt.text}</span>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Area Navigasi Grid (Kanan) */}
                            <div className="w-full md:w-80 bg-white border-l border-slate-200 p-4 overflow-y-auto flex-shrink-0 border-t md:border-t-0 max-h-64 md:max-h-full">
                                <div className="mb-4 flex justify-between items-center">
                                    <h3 className="font-bold text-slate-700">Navigasi Soal</h3>
                                    <span className="text-xs font-medium text-slate-500">{answeredCount} / {examData.length} Dijawab</span>
                                </div>
                                <div className="grid grid-cols-5 md:grid-cols-4 gap-2">
                                    {examData.map((q, i) => {
                                        const isCurrent = i === currentQuestionIdx;
                                        const isAnswered = isQuestionAnswered(q);
                                        let bgClass = "bg-white border-slate-200 text-slate-600 hover:bg-slate-100";
                                        if (isCurrent) bgClass = "bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-500/30";
                                        else if (isAnswered) bgClass = "bg-green-500 border-green-500 text-white";

                                        return (
                                            <button 
                                                key={i}
                                                onClick={() => setCurrentQuestionIdx(i)}
                                                className={`h-10 rounded border font-medium transition-colors ${bgClass}`}
                                            >
                                                {i + 1}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        </main>

                        {/* FOOTER ACTIONS */}
                        <footer className="bg-white border-t border-slate-200 p-4 z-10 absolute bottom-0 md:static w-full">
                            <div className="max-w-6xl mx-auto flex justify-between items-center gap-2">
                                <button 
                                    onClick={() => setCurrentQuestionIdx(prev => Math.max(0, prev - 1))}
                                    disabled={currentQuestionIdx === 0}
                                    className="px-4 md:px-6 py-2.5 rounded-lg font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 disabled:opacity-50 flex items-center gap-2"
                                >
                                    <i data-lucide="chevron-left" className="w-5 h-5"></i> <span className="hidden md:inline">Sebelumnya</span>
                                </button>
                                
                                {currentQuestionIdx === examData.length - 1 ? (
                                    <button 
                                        onClick={requestSubmit}
                                        className="px-6 py-2.5 rounded-lg font-bold text-white bg-green-600 hover:bg-green-700 shadow-lg shadow-green-500/30 flex items-center gap-2"
                                    >
                                        <i data-lucide="check-circle" className="w-5 h-5"></i> Selesai & Kumpul
                                    </button>
                                ) : (
                                    <button 
                                        onClick={() => setCurrentQuestionIdx(prev => Math.min(examData.length - 1, prev + 1))}
                                        className="px-4 md:px-6 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-500/30 flex items-center gap-2"
                                    >
                                        <span className="hidden md:inline">Selanjutnya</span> <i data-lucide="chevron-right" className="w-5 h-5"></i>
                                    </button>
                                )}
                            </div>
                        </footer>

                        {/* Fullscreen Overlay for Submitting state */}
                        {isSubmitting && (
                            <div className="fixed inset-0 z-[9999] bg-white/90 backdrop-blur flex flex-col items-center justify-center">
                                <div className="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                                <h2 className="text-xl font-bold text-slate-800">Mengirim Jawaban...</h2>
                                <p className="text-slate-500 mt-2">Mohon tunggu, jangan tutup halaman ini.</p>
                            </div>
                        )}
                    </div>
                );
            }

            if (appState === 'finished') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-panel w-full max-w-md p-8 rounded-2xl text-center">
                            <div className="bg-green-100 text-green-600 p-4 rounded-full inline-flex mb-6 animate-bounce">
                                <i data-lucide="check-circle" className="w-12 h-12"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800 mb-2">Ujian Selesai!</h1>
                            <p className="text-slate-600 mb-8">Terima kasih <b>{studentData.name}</b>. Jawaban Anda telah berhasil dikirim ke server.</p>
                            
                            <div className="bg-slate-50 rounded-xl p-6 mb-8 border border-slate-200">
                                <p className="text-sm font-medium text-slate-500 uppercase tracking-wider mb-1">Skor Anda</p>
                                <p className="text-6xl font-black text-blue-600">{finalScore}</p>
                            </div>

                            <button onClick={() => window.location.reload()} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg transition-all">
                                Kembali ke Beranda
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inisialisasi ikon Lucide setelah render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
